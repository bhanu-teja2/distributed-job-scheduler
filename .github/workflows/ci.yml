name: Go CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"
      - uses: Azure/setup-helm@v5.0.1
      - name: Format check
        run: |
          gofmt -w .
          git diff --exit-code
      - name: Test
        run: go test ./...
      - name: Race test
        run: go test -race ./...
      - name: Build API
        run: go build ./cmd/api
      - name: Build worker
        run: go build ./cmd/worker
      - name: Docker build API
        run: docker build -f Dockerfile.api .
      - name: Docker build worker
        run: docker build -f Dockerfile.worker .
      - name: Helm lint
        run: helm lint charts/distributed-job-scheduler
      - name: Helm template
        run: helm template scheduler charts/distributed-job-scheduler
