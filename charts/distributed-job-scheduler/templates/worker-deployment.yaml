apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "scheduler.fullname" . }}-worker
  labels:
    {{- include "scheduler.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        {{- include "scheduler.labels" . | nindent 8 }}
        app.kubernetes.io/component: worker
    spec:
      serviceAccountName: {{ include "scheduler.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: worker
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          image: "{{ .Values.worker.image.repository }}:{{ .Values.worker.image.tag }}"
          imagePullPolicy: {{ .Values.worker.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ include "scheduler.fullname" . }}-config
            - secretRef:
                name: {{ include "scheduler.secretName" . }}
          ports:
            - name: health
              containerPort: {{ .Values.worker.healthPort }}
          readinessProbe:
            httpGet: {path: /ready, port: health}
            initialDelaySeconds: 5
          livenessProbe:
            httpGet: {path: /health, port: health}
            initialDelaySeconds: 10
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
