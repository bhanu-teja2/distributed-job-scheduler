apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "scheduler.fullname" . }}-config
  labels:
    {{- include "scheduler.labels" . | nindent 4 }}
data:
  APP_ENV: {{ .Values.env.appEnv | quote }}
  API_PORT: {{ .Values.api.port | quote }}
  WORKER_CONCURRENCY: {{ .Values.worker.concurrency | quote }}
  WORKER_POLL_INTERVAL_SECONDS: {{ .Values.worker.pollIntervalSeconds | quote }}
  WORKER_BATCH_SIZE: {{ .Values.worker.batchSize | quote }}
  POSTGRES_HOST: {{ .Values.postgres.host | quote }}
  POSTGRES_PORT: {{ .Values.postgres.port | quote }}
  POSTGRES_USER: {{ .Values.postgres.user | quote }}
  POSTGRES_DB: {{ .Values.postgres.database | quote }}
  POSTGRES_SSL_MODE: {{ .Values.postgres.sslMode | quote }}
  REDIS_ADDR: {{ .Values.redis.addr | quote }}
  REDIS_DB: {{ .Values.redis.db | quote }}
  KAFKA_BROKERS: {{ .Values.kafka.brokers | quote }}
  KAFKA_EVENTS_TOPIC: {{ .Values.kafka.eventsTopic | quote }}
  JOB_LOCK_TTL_SECONDS: {{ .Values.env.jobLockTTLSeconds | quote }}
  WORKER_HEARTBEAT_TTL_SECONDS: {{ .Values.env.workerHeartbeatTTLSeconds | quote }}
  WORKER_HEARTBEAT_INTERVAL_SECONDS: {{ .Values.env.workerHeartbeatIntervalSeconds | quote }}
  JOB_DEFAULT_TIMEOUT_SECONDS: {{ .Values.env.jobDefaultTimeoutSeconds | quote }}
  JOB_DEFAULT_MAX_RETRIES: {{ .Values.env.jobDefaultMaxRetries | quote }}
  JOB_DEFAULT_BACKOFF_SECONDS: {{ .Values.env.jobDefaultBackoffSeconds | quote }}
  LOG_LEVEL: {{ .Values.env.logLevel | quote }}
  AUTH_ENABLED: {{ .Values.env.authEnabled | quote }}
  CORS_ALLOWED_ORIGINS: {{ .Values.env.corsAllowedOrigins | quote }}
  RATE_LIMIT_PER_MINUTE: {{ .Values.env.rateLimitPerMinute | quote }}
  WORKER_HEALTH_PORT: {{ .Values.worker.healthPort | quote }}
  EVENT_RELAY_HEALTH_PORT: {{ .Values.relay.healthPort | quote }}
  EVENT_RELAY_BATCH_SIZE: {{ .Values.relay.batchSize | quote }}
  EVENT_RELAY_POLL_INTERVAL_SECONDS: {{ .Values.relay.pollIntervalSeconds | quote }}
  WEBHOOK_ALLOWED_HOSTS: {{ .Values.env.webhookAllowedHosts | quote }}
  WEBHOOK_ALLOW_PRIVATE: {{ .Values.env.webhookAllowPrivate | quote }}
