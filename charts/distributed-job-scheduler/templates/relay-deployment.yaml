apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "scheduler.fullname" . }}-relay
  labels:
    {{- include "scheduler.labels" . | nindent 4 }}
    app.kubernetes.io/component: relay
spec:
  replicas: {{ .Values.relay.replicas }}
  selector:
    matchLabels: {app.kubernetes.io/instance: {{ .Release.Name }}, app.kubernetes.io/component: relay}
  template:
    metadata:
      labels:
        {{- include "scheduler.labels" . | nindent 8 }}
        app.kubernetes.io/component: relay
    spec:
      serviceAccountName: {{ include "scheduler.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: relay
          image: "{{ .Values.relay.image.repository }}:{{ .Values.relay.image.tag }}"
          imagePullPolicy: {{ .Values.relay.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          envFrom:
            - configMapRef: {name: {{ include "scheduler.fullname" . }}-config}
            - secretRef: {name: {{ include "scheduler.secretName" . }}}
          ports:
            - {name: health, containerPort: {{ .Values.relay.healthPort }}}
          readinessProbe: {httpGet: {path: /ready, port: health}, initialDelaySeconds: 5}
          livenessProbe: {httpGet: {path: /health, port: health}, initialDelaySeconds: 10}
          resources:
            {{- toYaml .Values.relay.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "scheduler.fullname" . }}-relay
  labels:
    {{- include "scheduler.labels" . | nindent 4 }}
spec:
  selector: {app.kubernetes.io/instance: {{ .Release.Name }}, app.kubernetes.io/component: relay}
  ports:
    - {name: health, port: {{ .Values.relay.healthPort }}, targetPort: health}
