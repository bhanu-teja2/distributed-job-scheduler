{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: {name: {{ include "scheduler.fullname" . }}-backend-health}
spec:
  podSelector:
    matchExpressions:
      - {key: app.kubernetes.io/component, operator: In, values: [worker, relay]}
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector: {matchLabels: {app.kubernetes.io/name: {{ include "scheduler.name" . }}}}
{{- end }}
